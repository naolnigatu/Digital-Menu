<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dinex - Modern Digital Restaurant & Business Management Platform</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Manage menus, orders, staff, kitchen, reservations, delivery, customers, payments, analytics, and more—all from one platform." />
    <meta name="keywords" content="restaurant management, digital menu, POS, kitchen display system, multi-tenant restaurant software, food delivery, hospitality" />
    <meta name="author" content="Dinex Platform" />
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Dinex - Restaurant Management Platform" />
    <meta property="og:description" content="Manage menus, orders, staff, kitchen, reservations, delivery, customers, payments, and analytics all from one modern digital platform." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dinex.app/" />
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dinex - Restaurant Management Platform" />
    <meta name="twitter:description" content="Manage menus, orders, staff, kitchen, reservations, delivery, customers, payments, and analytics all from one modern digital platform." />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Dinex",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Modern Digital Restaurant & Business Management Platform. Manage menus, orders, staff, kitchen, reservations, delivery, and more."
    }
    </script>
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>  
  </body>
</html>
